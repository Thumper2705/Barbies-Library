<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Barbie's Library">
<title>Barbie's Library 📚</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #e8547a;
    --pink-light: #f7c5d2;
    --pink-pale: #fdf0f3;
    --gold: #c9a84c;
    --dark: #1a1118;
    --text: #2d1f2a;
    --muted: #8a7080;
    --card: #ffffff;
    --bg: #fdf6f8;
    --border: #f0dde4;
    --green: #4caf7d;
    --orange: #e8954a;
    --blue: #5a8fd4;
    --purple: #9b6dca;
    --red: #e05555;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1118 0%, #2d1528 50%, #1e0d1a 100%);
    padding: 48px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(232,84,122,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(201,168,76,0.12) 0%, transparent 50%);
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    color: #fff;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }
  .header-title span { color: var(--pink); font-style: italic; }
  .header-sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; position: relative; z-index: 1; letter-spacing: 1px; text-transform: uppercase; }

  /* STAT PILLS */
  .stats-row {
    display: flex; gap: 8px; overflow-x: auto; padding: 16px 16px 4px;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .stats-row::-webkit-scrollbar { display: none; }
  .stat-pill {
    flex-shrink: 0; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 20px; padding: 8px 14px; text-align: center;
    cursor: pointer; transition: all 0.2s;
  }
  .stat-pill.active { border-color: var(--pink); background: var(--pink); color: #fff; }
  .stat-pill .count { font-size: 18px; font-weight: 700; display: block; line-height: 1; }
  .stat-pill .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.75; margin-top: 2px; }
  .stat-pill.active .label { opacity: 0.9; }

  /* SEARCH + FILTER */
  .toolbar { padding: 12px 16px; display: flex; gap: 10px; align-items: center; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input {
    width: 100%; padding: 10px 14px 10px 36px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    background: var(--card); color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--pink); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; pointer-events: none; }
  .sort-btn {
    flex-shrink: 0; padding: 10px 14px; border: 1.5px solid var(--border);
    border-radius: 12px; background: var(--card); cursor: pointer;
    font-size: 13px; color: var(--muted); font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .sort-btn.active { border-color: var(--gold); color: var(--gold); }

  /* GENRE FILTER */
  .genre-row {
    display: flex; gap: 6px; overflow-x: auto; padding: 0 16px 12px;
    scrollbar-width: none;
  }
  .genre-row::-webkit-scrollbar { display: none; }
  .genre-chip {
    flex-shrink: 0; padding: 5px 11px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--card);
    font-size: 12px; cursor: pointer; color: var(--muted); transition: all 0.15s;
  }
  .genre-chip.active { background: var(--dark); color: #fff; border-color: var(--dark); }

  /* BOOK LIST */
  .book-list { padding: 4px 12px 100px; display: flex; flex-direction: column; gap: 10px; }
  .book-card {
    background: var(--card); border-radius: 16px; padding: 14px 16px;
    border: 1.5px solid var(--border); display: flex; gap: 12px;
    cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .book-card:active { transform: scale(0.98); }
  .book-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    border-radius: 16px 0 0 16px;
  }
  .book-card.status-TBR::before { background: var(--purple); }
  .book-card.status-Complete::before { background: var(--green); }
  .book-card.status-Reading::before { background: var(--blue); }
  .book-card.status-DNF::before { background: var(--red); }
  .book-card.status-Old::before { background: var(--gold); }
  .book-card.status-Wont::before { background: var(--muted); }

  .book-spine {
    width: 44px; height: 64px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--pink-light), var(--pink-pale));
  }
  .book-info { flex: 1; min-width: 0; }
  .book-title {
    font-family: 'Playfair Display', serif; font-size: 15px;
    font-weight: 700; line-height: 1.3; color: var(--dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .book-author { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .book-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .badge {
    font-size: 10px; padding: 3px 8px; border-radius: 10px;
    font-weight: 500; letter-spacing: 0.3px;
  }
  .badge-status-TBR { background: #ede9f7; color: var(--purple); }
  .badge-status-Complete { background: #e8f5ed; color: var(--green); }
  .badge-status-Reading { background: #e8eef7; color: var(--blue); }
  .badge-status-DNF { background: #fde8e8; color: var(--red); }
  .badge-status-Old { background: #f7f0e0; color: var(--gold); }
  .badge-status-Wont { background: #f0eded; color: var(--muted); }
  .badge-genre { background: var(--pink-pale); color: var(--pink); }
  .book-ratings { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-direction: column; align-items: flex-end; }
  .rating-my { font-size: 15px; font-weight: 700; color: var(--pink); }
  .rating-gr { font-size: 11px; color: var(--muted); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,17,24,0.7);
    z-index: 100; display: none; align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border-radius: 28px 28px 0 0;
    padding: 0 0 40px; width: 100%; max-height: 88vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .modal-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--dark); line-height: 1.3; }
  .modal-author { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .modal-body { padding: 20px; }
  .modal-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .modal-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 4px; }
  .modal-val { font-size: 15px; color: var(--dark); font-weight: 500; }
  .modal-section { margin-bottom: 20px; }
  .modal-notes { background: var(--pink-pale); border-radius: 12px; padding: 12px 14px; font-size: 14px; color: var(--text); font-style: italic; border-left: 3px solid var(--pink); }

  /* RATING EDIT */
  .rating-edit-wrap { margin-top: 12px; }
  .stars-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .star-btn {
    width: 38px; height: 38px; border-radius: 10px; border: 1.5px solid var(--border);
    background: var(--card); font-size: 16px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif;
  }
  .star-btn.selected { background: var(--pink); border-color: var(--pink); color: #fff; }
  .status-select-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .status-sel-btn {
    padding: 7px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card); font-size: 12px; cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif; color: var(--muted);
  }
  .status-sel-btn.selected { background: var(--dark); color: #fff; border-color: var(--dark); }
  .notes-input {
    width: 100%; margin-top: 8px; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
    background: var(--card); resize: none; outline: none; min-height: 70px;
  }
  .notes-input:focus { border-color: var(--pink); }
  .save-btn {
    width: 100%; padding: 14px; background: var(--pink); color: #fff;
    border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 16px; font-family: 'DM Sans', sans-serif;
    transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.85; }

  /* CHARTS VIEW */
  .charts-view { padding: 16px; display: none; }
  .charts-view.visible { display: block; }
  .chart-card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 14px; border: 1.5px solid var(--border); }
  .chart-title { font-family: 'Playfair Display', serif; font-size: 16px; margin-bottom: 14px; color: var(--dark); }
  .bar-item { margin-bottom: 10px; }
  .bar-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
  .bar-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.5s ease; }

  /* NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    display: flex; z-index: 50;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 0; cursor: pointer; transition: color 0.2s;
    font-size: 10px; color: var(--muted); letter-spacing: 0.3px; text-transform: uppercase;
  }
  .nav-btn .icon { font-size: 22px; }
  .nav-btn.active { color: var(--pink); }

  /* TOP LIST */
  .top-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .top-rank { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--pink-light); font-weight: 700; width: 32px; flex-shrink: 0; }
  .top-rank.gold { color: var(--gold); }
  .top-rank.silver { color: #a0a0a0; }
  .top-rank.bronze { color: #cd7f32; }
  .top-info { flex: 1; min-width: 0; }
  .top-book { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-auth { font-size: 11px; color: var(--muted); }
  .top-score { font-size: 18px; font-weight: 700; color: var(--pink); flex-shrink: 0; }

  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .results-count { padding: 4px 16px 8px; font-size: 12px; color: var(--muted); }
</style>
</head>

</div>

<!-- BOOK MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">

        </div>
      </div>
      <div class="modal-row">
        <div>
          <div class="modal-label">Genre</div>
          <div class="modal-val" id="mGenre"></div>
        </div>
        <div style="text-align:right">
          <div class="modal-label">GR Rating</div>
          <div class="modal-val" id="mGR"></div>
        </div>
      </div>
      <div id="mNotesWrap" style="display:none">
        <div class="modal-label">Notes</div>
        <div class="modal-notes" id="mNotes"></div>
      </div>

      <div style="height:1px;background:var(--border);margin:16px 0"></div>

      <!-- Edit Section -->
      <div class="modal-section">
        <div class="modal-label">My Status</div>
        <div class="status-select-row" id="statusBtns"></div>
      </div>
      <div class="modal-section">
        <div class="modal-label">My Rating (out of 10)</div>
        <div class="stars-row" id="ratingBtns"></div>
      </div>
      <div class="modal-section">
        <div class="modal-label">My Notes</div>
        <textarea class="notes-input" id="notesInput" placeholder="Write your thoughts…"></textarea>
      </div>
      <button class="save-btn" onclick="saveBook()">Save Changes ✓</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-btn active" id="navLib" onclick="showView('library')">
    <span class="icon">📚</span>Library
  </div>
  <div class="nav-btn" id="navCharts" onclick="showView('charts')">
    <span class="icon">📊</span>Charts
  </div>
</div>

let books = BOOKS_RAW.map(r => ({
  id: r[0], title: r[1], author: r[2], status: r[3],
  series: r[4], genre: r[5], pages: r[6], grRating: r[7],
  myRating: r[8], notes: r[9]
}));

// Load saved changes from localStorage
function loadSaved() {
  try {
    const saved = JSON.parse(localStorage.getItem('barbies_library') || '{}');
    books = books.map(b => saved[b.id] ? {...b, ...saved[b.id]} : b);
  } catch(e) {}
}
loadSaved();

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeStatus = 'All';
let activeGenre = 'All';
let sortMode = 0; // 0=default 1=title 2=rating 3=grRating
const sortLabels = ['Sort ✦', 'A–Z ✦', 'My ★ ✦', 'GR ★ ✦'];
let currentBook = null;

// ── GENRES ────────────────────────────────────────────────────────────────────
function getTopGenres() {
  const counts = {};
  books.forEach(b => {
    const g = normalizeGenre(b.genre);
    counts[g] = (counts[g]||0)+1;
  });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10).map(x=>x[0]);
}

function normalizeGenre(g) {
  if (!g) return 'Other';
  const l = g.toLowerCase();
  if (l.includes('romantasy') || l.includes('romantic fantasy')) return 'Romantasy';
  if (l.includes('fantasy romance') || l.includes('romantic')) return 'Fantasy Romance';
  if (l.includes('fantasy')) return 'Fantasy';
  if (l.includes('thriller') || l.includes('crime')) return 'Thriller/Crime';
  if (l.includes('sci')) return 'Sci-Fi';
  if (l.includes('young adult')) return 'Young Adult';
  if (l.includes('non-fiction') || l.includes('nonfiction') || l.includes('memoir') || l.includes('biography')) return 'Non-Fiction';
  if (l.includes('horror') || l.includes('dark fantasy')) return 'Dark/Horror';
  if (l.includes('historical')) return 'Historical';
  if (l.includes('romance') || l.includes('sports romance')) return 'Romance';
  return 'Other';
}

// ── RENDER GENRE ROW ─────────────────────────────────────────────────────────
function renderGenreRow() {
  const genres = ['All', ...getTopGenres()];
  const row = document.getElementById('genreRow');
  row.innerHTML = genres.map(g =>
    `<div class="genre-chip${activeGenre===g?' active':''}" onclick="filterGenre(this,'${g}')">${g}</div>`
  ).join('');
}

// ── BOOK EMOJI ────────────────────────────────────────────────────────────────
function bookEmoji(genre) {
  const g = (genre||'').toLowerCase();
  if (g.includes('fantasy') || g.includes('romantasy')) return '🏰';
  if (g.includes('sci')) return '🚀';
  if (g.includes('crime') || g.includes('thriller')) return '🔍';
  if (g.includes('horror') || g.includes('dark')) return '👻';
  if (g.includes('historical')) return '⚔️';
  if (g.includes('romance')) return '💕';
  if (g.includes('non-fiction') || g.includes('memoir') || g.includes('biography')) return '📖';
  if (g.includes('graphic')) return '🎨';
  if (g.includes('young adult')) return '✨';
  return '📚';
}

// ── STATUS KEY ────────────────────────────────────────────────────────────────
function statusKey(s) {
  if (s === "Won't Continue") return 'Wont';
  return s;
}

function statusLabel(s) {
  if (s === "Won't Continue") return "Won't";
  return s;
}

// ── FILTER + RENDER ───────────────────────────────────────────────────────────
function filterStatus(el, val) {
  activeStatus = val;
  document.querySelectorAll('.stat-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  activeGenre = 'All';
  renderGenreRow();
  renderBooks();
}

function filterGenre(el, val) {
  activeGenre = val;
  document.querySelectorAll('.genre-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderBooks();
}

function cycleSort() {
  sortMode = (sortMode + 1) % 4;
  document.getElementById('sortBtn').textContent = sortLabels[sortMode];
  document.getElementById('sortBtn').classList.toggle('active', sortMode > 0);
  renderBooks();
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = books.filter(b => {
    if (activeStatus !== 'All' && statusKey(b.status) !== activeStatus) return false;
    if (activeGenre !== 'All' && normalizeGenre(b.genre) !== activeGenre) return false;
    if (q && !b.title.toLowerCase().includes(q) && !b.author.toLowerCase().includes(q)) return false;
    return true;
  });

  if (sortMode === 1) list.sort((a,b) => a.title.localeCompare(b.title));
  else if (sortMode === 2) list.sort((a,b) => (b.myRating||0) - (a.myRating||0));
  else if (sortMode === 3) list.sort((a,b) => (b.grRating||0) - (a.grRating||0));
  return list;
}

function renderBooks() {
  const list = getFiltered();
  document.getElementById('resultsCount').textContent = `${list.length} book${list.length!==1?'s':''}`;
  const el = document.getElementById('bookList');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>No books found</div></div>`;
    return;
  }
  el.innerHTML = list.map(b => {
    const sk = statusKey(b.status);
    return `<div class="book-card status-${sk}" onclick="openBook(${b.id})">
      <div class="book-spine">${bookEmoji(b.genre)}</div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author}</div>
        <div class="book-meta">
          <span class="badge badge-status-${sk}">${statusLabel(b.status)}</span>
          <span class="badge badge-genre">${normalizeGenre(b.genre)}</span>
        </div>
      </div>
      <div class="book-ratings">
        ${b.myRating != null ? `<div class="rating-my">${b.myRating}</div>` : '<div class="rating-my" style="color:var(--border)">–</div>'}
        <div class="rating-gr">GR ${b.grRating||'–'}</div>
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openBook(id) {
  currentBook = books.find(b => b.id === id);
  if (!currentBook) return;
  const b = currentBook;
  document.getElementById('mTitle').textContent = b.title;
  document.getElementById('mAuthor').textContent = b.author;
  document.getElementById('mSeries').textContent = b.series || '—';
  document.getElementById('mPages').textContent = b.pages ? `${b.pages} pages` : '—';
  document.getElementById('mGenre').textContent = b.genre || '—';
  document.getElementById('mGR').textContent = b.grRating ? `${b.grRating} ★` : '—';

  const nw = document.getElementById('mNotesWrap');
  if (b.notes) { nw.style.display='block'; document.getElementById('mNotes').textContent=b.notes; }
  else { nw.style.display='none'; }

  // Status buttons
  const statuses = ['TBR','Reading','Complete','Old','DNF',"Won't Continue"];
  document.getElementById('statusBtns').innerHTML = statuses.map(s =>
    `<button class="status-sel-btn${b.status===s?' selected':''}" onclick="selectStatus(this,'${s}')">${s}</button>`
  ).join('');

  // Rating buttons
  const ratings = [1,2,3,4,5,6,7,8,9,9.5,10];
  document.getElementById('ratingBtns').innerHTML = ratings.map(r =>
    `<button class="star-btn${b.myRating===r?' selected':''}" onclick="selectRating(this,${r})">${r}</button>`
  ).join('');

  document.getElementById('notesInput').value = b.notes || '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function selectStatus(el, val) {
  document.querySelectorAll('.status-sel-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  currentBook._pendingStatus = val;
}

function selectRating(el, val) {
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  currentBook._pendingRating = val;
}

function saveBook() {
  if (!currentBook) return;
  const newStatus = currentBook._pendingStatus || currentBook.status;
  const newRating = currentBook._pendingRating !== undefined ? currentBook._pendingRating : currentBook.myRating;
  const newNotes = document.getElementById('notesInput').value.trim() || null;

  // Update in books array
  const idx = books.findIndex(b => b.id === currentBook.id);
  books[idx] = {...books[idx], status: newStatus, myRating: newRating, notes: newNotes};

  // Persist to localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('barbies_library') || '{}');
    saved[currentBook.id] = { status: newStatus, myRating: newRating, notes: newNotes };
    localStorage.setItem('barbies_library', JSON.stringify(saved));
  } catch(e) {}

  document.getElementById('modalOverlay').classList.remove('open');
  renderBooks();
  if (document.getElementById('chartsView').classList.contains('visible')) renderCharts();
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
function renderCharts() {
  // Top reads
  const rated = books.filter(b => b.myRating != null).sort((a,b)=>(b.myRating||0)-(a.myRating||0)).slice(0,10);
  const rankClasses = ['gold','silver','bronze','','','','','','',''];
  document.getElementById('topList').innerHTML = rated.map((b,i) =>
    `<div class="top-item">
      <div class="top-rank ${rankClasses[i]}">${i+1}</div>
      <div class="top-info">
        <div class="top-book">${b.title}</div>
        <div class="top-auth">${b.author}</div>
      </div>
      <div class="top-score">${b.myRating}</div>
    </div>`
  ).join('');

  // Status chart
  const statData = [
    {label:'TBR', count: books.filter(b=>b.status==='TBR').length, color:'#9b6dca'},
    {label:"Won't Continue", count: books.filter(b=>b.status==="Won't Continue").length, color:'#8a7080'},
    {label:'Old', count: books.filter(b=>b.status==='Old').length, color:'#c9a84c'},
    {label:'Complete', count: books.filter(b=>b.status==='Complete').length, color:'#4caf7d'},
    {label:'DNF', count: books.filter(b=>b.status==='DNF').length, color:'#e05555'},
    {label:'Reading', count: books.filter(b=>b.status==='Reading').length, color:'#5a8fd4'},
  ];
  const maxS = Math.max(...statData.map(d=>d.count));
  document.getElementById('statusChart').innerHTML = statData.map(d =>
    `<div class="bar-item">
      <div class="bar-label"><span>${d.label}</span><span>${d.count}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(d.count/maxS*100).toFixed(1)}%;background:${d.color}"></div></div>
    </div>`
  ).join('');

  // Genre chart
  const genreCounts = {};
  books.forEach(b => { const g=normalizeGenre(b.genre); genreCounts[g]=(genreCounts[g]||0)+1; });
  const genreData = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxG = genreData[0][1];
  const genreColors = ['#e8547a','#c9a84c','#9b6dca','#5a8fd4','#4caf7d','#e8954a','#8a7080','#e05555'];
  document.getElementById('genreChart').innerHTML = genreData.map(([g,c],i) =>
    `<div class="bar-item">
      <div class="bar-label"><span>${g}</span><span>${c}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c/maxG*100).toFixed(1)}%;background:${genreColors[i%genreColors.length]}"></div></div>
    </div>`
  ).join('');

  // Ratings distribution
  const ratingsData = {};
  books.filter(b=>b.myRating!=null).forEach(b => {
    const r = String(b.myRating);
    ratingsData[r] = (ratingsData[r]||0)+1;
  });
  const rEntries = Object.entries(ratingsData).sort((a,b)=>parseFloat(a[0])-parseFloat(b[0]));
  const maxR = Math.max(...rEntries.map(x=>x[1]));
  document.getElementById('ratingsChart').innerHTML = rEntries.map(([r,c]) =>
    `<div class="bar-item">
      <div class="bar-label"><span>${r}/10</span><span>${c} book${c!==1?'s':''}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c/maxR*100).toFixed(1)}%;background:var(--pink)"></div></div>
    </div>`
  ).join('');
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function showView(view) {
  document.getElementById('libraryView').style.display = view==='library'?'block':'none';
  document.getElementById('chartsView').classList.toggle('visible', view==='charts');
  document.getElementById('navLib').classList.toggle('active', view==='library');
  document.getElementById('navCharts').classList.toggle('active', view==='charts');
  if (view === 'charts') renderCharts();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderGenreRow();
renderBooks();
</script>
